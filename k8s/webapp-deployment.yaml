apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          # Update this image name to match what your CI/CD builds
          image: my-ror-app:latest 
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_HOST
              value: postgres-service
            - name: DATABASE_USER
              value: myuser
            - name: DATABASE_PASSWORD
              value: secretpassword
            - name: DATABASE_NAME
              value: webapp_db